name: Lint, Type Check & Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lint Check
        run: npm run lint:check

      - name: Run TypeScript Check
        run: npm run type-check

      - name: Run Build
        run: npm run build
